<!DOCTYPE html>
<html lang="en" th:replace="~{base :: parent(~{::#content}, ~{::title})}">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup</title>
</head>

<body>
    <div id="content">
        <div class="grid grid-cols-12 min-h-screen place-items-center">

            <div class="col-span-12 sm:col-span-10 md:col-span-6 lg:col-span-4">

                <div class="block w-full p-6 border-2 border-gray-400 
          bg-gray-200 dark:bg-gray-800 
          text-gray-900 dark:text-white 
          rounded-lg shadow-md hover:shadow-lg transition">

                    <h5 class="mb-3 text-2xl font-semibold">
                        Sign Up here
                    </h5>

                    <p class="text-gray-900 dark:text-white">
                        Start managing your contacts on cloud.
                    </p>

                    <form th:action="@{/do-register}" th:object="${userForm}" method="post" class="mt-3">

                        <!-- Name -->
                        <div class="mb-3">
                            <label class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">
                                Name
                            </label>

                            <input type="text" th:field="*{name}" class="w-full px-3 py-2.5 rounded-lg border border-gray-300 
                   bg-white text-gray-900 placeholder-gray-500
                   focus:ring-blue-500 focus:border-blue-500

                   dark:bg-gray-800 dark:border-gray-600
                   dark:text-white dark:placeholder-gray-400 
                   dark:focus:ring-blue-500 dark:focus:border-blue-500" placeholder="Enter your name" required />
                        </div>

                        <!-- Email -->
                        <div class="mb-3">
                            <label class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">
                                Email
                            </label>

                            <input type="email" th:field="*{email}" class="w-full px-3 py-2.5 rounded-lg border border-gray-300 
                   bg-white text-gray-900 placeholder-gray-500
                   focus:ring-blue-500 focus:border-blue-500

                   dark:bg-gray-800 dark:border-gray-600 
                   dark:text-white dark:placeholder-gray-400 
                   dark:focus:ring-blue-500 dark:focus:border-blue-500" placeholder="Enter your email" required />
                        </div>

                        <!-- Password -->
                        <div class="mb-3">
                            <label class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">
                                Password
                            </label>

                            <input type="password" th:field="*{password}" class="w-full px-3 py-2.5 rounded-lg border border-gray-300 
                   bg-white text-gray-900 placeholder-gray-500
                   focus:ring-blue-500 focus:border-blue-500

                   dark:bg-gray-800 dark:border-gray-600 
                   dark:text-white dark:placeholder-gray-400 
                   dark:focus:ring-blue-500 dark:focus:border-blue-500" placeholder="Enter your password" required />
                        </div>

                        <!-- phone number -->
                        <div class="mb-3">
                            <label class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">
                                Phone Number
                            </label>

                            <input type="tel" th:field="*{phoneNumber}" class="w-full px-3 py-2.5 rounded-lg border border-gray-300 
                   bg-white text-gray-900 placeholder-gray-500
                   focus:ring-blue-500 focus:border-blue-500

                   dark:bg-gray-800 dark:border-gray-600 
                   dark:text-white dark:placeholder-gray-400 
                   dark:focus:ring-blue-500 dark:focus:border-blue-500" placeholder="Enter your phone number"
                                required />
                        </div>

                        <!-- about section -->
                        <div class="mb-3">
                            <label for="message" class="block mb-2.5 text-sm font-medium text-heading">Write something about yourself</label>
                            <textarea th:field="*{about}"id="about" rows="4"
                                class="w-full px-3 py-2.5 rounded-lg border border-gray-300 
                       bg-white text-gray-900 placeholder-gray-500
                       focus:ring-blue-500 focus:border-blue-500
    
                       dark:bg-gray-800 dark:border-gray-600 
                       dark:text-white dark:placeholder-gray-400 
                       dark:focus:ring-blue-500 dark:focus:border-blue-500"
                                placeholder="Write here..."></textarea>
                        </div>

                        <!-- buttons -->
                        <div class="mb-3 flex justify-center space-x-3">
                            <button type="submit" class="px-4 py-2 text-white bg-blue-600 hover:bg-blue-700 focus:ring-4 focus:ring-blue-300 font-medium rounded-lg text-sm dark:bg-blue-600 dark:hover:bg-blue-700 dark:focus:ring-blue-800">Sign Up</button>

                            <button type="reset" class="px-4 py-2 text-white bg-blue-600 hover:bg-blue-700 focus:ring-4 focus:ring-blue-300 font-medium rounded-lg text-sm dark:bg-blue-600 dark:hover:bg-blue-700 dark:focus:ring-blue-800">Reset</button>
                        </div>
                    </form>

                </div>

            </div>

        </div>
    </div>
</body>

</html>
